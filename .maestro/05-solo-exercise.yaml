appId: com.preventia.app
name: "05 - Solo Exercise Flow"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 8000
# Dismiss deep-link dialog if present
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Login
- tapOn:
    id: "login-email"
- inputText: "test@preventia.test"
- tapOn:
    id: "login-password"
- inputText: "testpassword123"
- tapOn: "Sign In"

- waitForAnimationToEnd:
    timeout: 8000

# Handle onboarding if shown
- runFlow:
    when:
      visible: "Assess Your Baseline"
    file: .maestro/utils/complete-onboarding.yaml

# Navigate to Solo tab
- tapOn: "Solo"

# Wait for exercise to load
- waitForAnimationToEnd:
    timeout: 8000
- assertNotVisible: "Loading exercise…"
- takeScreenshot: "05-solo-exercise-loaded"

# Exercise should be displayed
- assertVisible:
    id: "exercise-name"
- assertVisible:
    id: "exercise-prompt"
- assertVisible:
    id: "elapsed-timer"

# Enter a response
- tapOn:
    text: "Type your response here…"
- inputText: "This is my test response for the cognitive exercise. I am demonstrating good recall and processing ability."

# Submit
- assertVisible:
    id: "submit-btn"
- tapOn:
    id: "submit-btn"

# Wait for scoring (Claude API call)
- waitForAnimationToEnd:
    timeout: 25000
- takeScreenshot: "05-solo-exercise-result"

# Should see score result
- assertVisible:
    id: "score-value"
- assertVisible:
    id: "score-feedback"
- assertVisible: "Next Exercise"

# Tap next exercise
- tapOn:
    id: "next-exercise-btn"

# Should load new exercise
- waitForAnimationToEnd:
    timeout: 8000
- assertNotVisible: "Loading exercise…"
- assertVisible:
    id: "exercise-name"
- takeScreenshot: "05-solo-second-exercise"

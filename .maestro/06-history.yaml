appId: com.preventia.app
name: "06 - History Tab"
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 8000
# Dismiss deep-link dialog if present
- tapOn:
    text: "Open"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Login
- tapOn:
    id: "login-email"
- inputText: "test@preventia.test"
- tapOn:
    id: "login-password"
- inputText: "testpassword123"
- tapOn: "Sign In"

- waitForAnimationToEnd:
    timeout: 8000

# Handle onboarding if shown
- runFlow:
    when:
      visible: "Assess Your Baseline"
    file: .maestro/utils/complete-onboarding.yaml

# Navigate to History tab
- tapOn: "History"

# Wait for data load
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: "06-history-loaded"

# Stats card should be visible
- assertVisible: "Streak"
- assertVisible: "Level"

# Should not crash even with no data (new user)
- assertNotVisible: "Something went wrong"
- assertNotVisible: "Error"

# Scroll down to see exercise history
- scroll

- takeScreenshot: "06-history-scrolled"

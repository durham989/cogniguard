appId: com.preventia.app
name: "01 - User Registration"
# Prerequisite: app must be showing the login screen (logged out state)
---
- launchApp
- waitForAnimationToEnd:
    timeout: 5000

# Should see Preventia login screen
- assertVisible: "Preventia"
- assertVisible: "Sign In"

# Navigate to registration
- tapOn: "Sign up"
- assertVisible: "Create Account"

# Fill in the form
- tapOn:
    id: "register-name"
- inputText: "QA Test User"

- tapOn:
    id: "register-email"
- inputText: "qa-test-${output.ts}@preventia.test"

- tapOn:
    id: "register-password"
- inputText: "testpassword123"

- tapOn:
    id: "register-confirm-password"
- inputText: "testpassword123"
- hideKeyboard

- tapOn: "Create Account"

# Should land on onboarding
- assertVisible: "Assess Your Baseline"
- takeScreenshot: "01-register-onboarding-reached"
